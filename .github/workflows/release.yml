name: Release Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  # -------------------------------------------------------------------
  # JOB 1: RELEASE PLEASE
  # -------------------------------------------------------------------
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
          path: .

  # -------------------------------------------------------------------
  # JOB 2: COMPILAR BUNDLE LINUX (Ubuntu 22.04 para compatibilidad total)
  # -------------------------------------------------------------------
  build_linux:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    name: Build Linux Bundle
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar dependencias de compilación
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang lld cmake ninja-build pkg-config \
            libgtk-3-dev libblkid-dev liblzma-dev \
            libgcrypt20-dev libsqlite3-dev build-essential

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Instalar dependencias de Flutter
        run: flutter pub get

      - name: Extraer versión del Tag
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          VERSION=${TAG#v}
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Compilar para Linux (Release)
        run: |
          flutter build linux --release --build-name=$APP_VERSION \
            --dart-define=SS_DEV_ID=${{ secrets.SS_DEV_ID }} \
            --dart-define=SS_DEV_PASSWORD=${{ secrets.SS_DEV_PASSWORD }} \
            --dart-define=SS_SOFT_NAME=${{ secrets.SS_SOFT_NAME }}

      - name: Subir Bundle como Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: build/linux/x64/release/bundle/

  # -------------------------------------------------------------------
  # JOB 3: EMPAQUETAR (AppImage & Tarball)
  # -------------------------------------------------------------------
  package:
    needs: [release-please, build_linux]
    name: Package Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Descargar Bundle Artefacto
        uses: actions/download-artifact@v4
        with:
          name: linux-bundle
          path: build/linux/x64/release/bundle/

      - name: Instalar herramientas de empaquetado
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf imagemagick libgdk-pixbuf2.0-dev flatpak flatpak-builder appstream

      - name: Configurar Flathub (para dependencias)
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Extraer versión del Tag
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          echo "APP_VERSION=${TAG#v}" >> $GITHUB_ENV

      - name: Generar AppImage
        run: ./scripts/package_appimage.sh ${{ env.APP_VERSION }}

      - name: Generar Tarball
        run: ./scripts/package_tarball.sh ${{ env.APP_VERSION }}

      - name: Generar Bundle Flatpak
        run: |
          cd flatpak/
          # Ajustar el manifiesto temporalmente para usar la versión actual y fuentes locales
          sed -i 's/type: archive/type: dir/' io.github.CarlosEvCode.GameLink.yml
          sed -i 's|url: .*||' io.github.CarlosEvCode.GameLink.yml
          sed -i 's|sha256: .*|path: ../build/linux/x64/release/bundle/|' io.github.CarlosEvCode.GameLink.yml
          
          # Actualizar versión en metainfo
          sed -i "s/release version=\".*\"/release version=\"${{ env.APP_VERSION }}\"/" io.github.CarlosEvCode.GameLink.metainfo.xml
          
          # Construir
          flatpak-builder --user --force-clean --install-deps-from=flathub builddir io.github.CarlosEvCode.GameLink.yml
          
          # Crear repositorio y bundle
          flatpak-builder --user --repo=repo --force-clean builddir io.github.CarlosEvCode.GameLink.yml
          flatpak build-bundle repo \
            ../game_link-${{ env.APP_VERSION }}-x86_64.flatpak \
            io.github.CarlosEvCode.GameLink \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Generar Paquete Debian (.deb)
        env:
          DEBFULLNAME: "Carlos EvCode"
          DEBEMAIL: "programer.cm12@gmail.com"
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper devscripts build-essential \
            libgtk-3-dev libglib2.0-dev libgdk-pixbuf2.0-dev \
            libpango1.0-dev libatk1.0-dev libcairo2-dev \
            libharfbuzz-dev libepoxy-dev libblkid-dev liblzma-dev
          
          # Actualizar el changelog de forma no interactiva
          # Usamos -b para permitir que la versión sea lo que diga el tag, y --distribution para Launchpad
          dch -b -v "${{ env.APP_VERSION }}-1" --distribution noble "Release ${{ env.APP_VERSION }}"
          
          dh_clean
          dpkg-buildpackage -b -us -uc
          mv ../game-link_${{ env.APP_VERSION }}-1_amd64.deb game_link-${{ env.APP_VERSION }}-amd64.deb

      - name: Generar Checksums (SHA256)
        run: |
          sha256sum game_link-*.AppImage *.zsync *.tar.xz game_link-*.flatpak game_link-*.deb > SHA256SUMS

      - name: Publicar Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            game_link-*.AppImage
            game_link-*.flatpak
            game_link-*.deb
            *.zsync
            *.tar.xz
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
